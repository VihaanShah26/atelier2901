<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Futura');

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: rgb(184, 206, 28);
            color: black;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .content {
            max-width: 600px;
            padding: 20px;
        }
        img {
            padding-top: 1vh;
            max-width: 100%;
            height: auto;
            margin-bottom: 20px;
        }
        p {
            font-family: 'Futura', sans-serif;
            font-size: 20px;
            margin: 0 0 20px;
        }
        .loader {
            border: 4px solid white; /* reduced border width for smaller loader */
            border-radius: 50%;
            border-top: 4px solid rgb(184, 206, 28);
            width: 50px; /* smaller width */
            height: 50px; /* smaller height */
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .social-icons {
            margin-top: 20px;
        }
        .social-icons a {
            color: #ecf0f1;
            margin: 0 10px;
            font-size: 2em;
            text-decoration: none;
            transition: color 0.3s;
        }
        .social-icons a:hover {
            color: rgb(184, 206, 28);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            {% load static %}
            <div class="loader"></div>
            <img src="{% static 'images/atelier_logo.png' %}" alt="Logo" style="width: 50%; height: auto;">
            <p>Creativity Under Construction, <br> Launching soon...</p>
            
        </div>
    </div>
</body>
</html>
