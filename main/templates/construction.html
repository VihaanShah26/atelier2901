<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Under Construction</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
            background: black;
            color: #ecf0f1;
        }
        .container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            text-align: center;
        }
        .content {
            max-width: 600px;
            padding: 20px;
        }
        h1 {
            font-size: 3em;
            margin: 0 0 20px;
        }
        p {
            font-size: 1.2em;
            margin: 0 0 20px;
        }
        .loader {
            border: 16px solid #f3f3f3;
            border-radius: 50%;
            border-top: 16px solid rgb(184, 206, 28);
            width: 120px;
            height: 120px;
            animation: spin 2s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .social-icons {
            margin-top: 20px;
        }
        .social-icons a {
            color: #ecf0f1;
            margin: 0 10px;
            font-size: 2em;
            text-decoration: none;
            transition: color 0.3s;
        }
        .social-icons a:hover {
            color: rgb(184, 206, 28);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="content">
            <h1>Under Construction</h1>
            <p>We are working very hard to give you the best experience possible! Please check back later.</p>
            <div class="loader"></div>
            <div class="social-icons">
                <a href="https://www.facebook.com" target="_blank">Facebook</a>
                <a href="https://www.twitter.com" target="_blank">Twitter</a>
                <a href="https://www.instagram.com/atelier_2901/" target="_blank">Instagram</a>
            </div>
        </div>
    </div>
</body>
</html>
